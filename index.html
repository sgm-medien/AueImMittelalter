<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildviewer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: rgb(255, 0, 0);
    font-family: sans-serif;
}

.image-container {
    width: 100%;
}

.image-container img {
    width: 100%;
    height: auto;
    display: block;
}

.controls {
    position: fixed;
    bottom: 100px; /* bewusst höher wegen OS */
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    box-sizing: border-box;
}

.controls img {
    width: 60px;
    height: auto;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="image-container">
    <img id="image" src="01.jpg">
</div>

<div class="controls">
    <img src="Button_L.png" id="prevBtn">
    <img src="Button_R.png" id="nextBtn">
</div>

<script>
const images = ["01.jpg", "02.jpg", "03.jpg", "04.jpg"];
let currentIndex = 0;

const img = document.getElementById("image");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function showImage(index) {
    currentIndex = (index + images.length) % images.length;
    img.src = images[currentIndex];
    window.scrollTo(0, 0); // immer oben starten
}

prevBtn.addEventListener("click", () => {
    showImage(currentIndex - 1);
});

nextBtn.addEventListener("click", () => {
    showImage(currentIndex + 1);
});
</script>

</body>
</html>
