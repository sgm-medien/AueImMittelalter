<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Bildviewer</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        background: rgb(0, 42, 180);
        overflow: hidden;
        height: 100%;
        touch-action: none;
        font-family: sans-serif;
    }

    .viewer {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    img.main-image {
        max-width: 100vw;
        height: auto;
        transform-origin: center center;
        transition: transform 0.05s ease-out;
        user-select: none;
        -webkit-user-drag: none;
    }

    .controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 40px;
        box-sizing: border-box;
        pointer-events: none;
    }

    .controls img {
        width: 60px;
        height: auto;
        pointer-events: auto;
        cursor: pointer;
        user-select: none;
    }
</style>
</head>

<body>

<div class="viewer">
    <img id="image" class="main-image" src="01.jpg" draggable="false">

    <div class="controls">
        <img src="Button_L.png" id="prevBtn">
        <img src="Button_R.png" id="nextBtn">
    </div>
</div>

<script>
const images = ["01.jpg", "02.jpg", "03.jpg", "04.jpg"];
let currentIndex = 0;

const img = document.getElementById("image");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function showImage(index) {
    currentIndex = (index + images.length) % images.length;
    img.src = images[currentIndex];
    resetZoom();
}

prevBtn.addEventListener("click", () => {
    showImage(currentIndex - 1);
});

nextBtn.addEventListener("click", () => {
    showImage(currentIndex + 1);
});

/* =========================
   Pinch Zoom + Drag Support
========================= */

let scale = 1;
let startDistance = 0;
let startScale = 1;
let posX = 0;
let posY = 0;
let startX = 0;
let startY = 0;

function getDistance(touches) {
    return Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
    );
}

function resetZoom() {
    scale = 1;
    posX = 0;
    posY = 0;
    img.style.transform = `translate(0px, 0px) scale(1)`;
}

img.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
        startDistance = getDistance(e.touches);
        startScale = scale;
    } else if (e.touches.length === 1) {
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
    }
});

img.addEventListener("touchmove", (e) => {
    e.preventDefault();

    if (e.touches.length === 2) {
        const newDistance = getDistance(e.touches);
        scale = startScale * (newDistance / startDistance);
        scale = Math.min(Math.max(1, scale), 5);
    } else if (e.touches.length === 1 && scale > 1) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
    }

    img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
});

</script>

</body>
</html>
