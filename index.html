<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildviewer mit JS-Zoom</title>
<style>
body {
    margin: 0;
    background: rgb(34, 4, 207);
    overflow: hidden;
    touch-action: none; /* Damit wir Touch-Zoom/Drag selbst handhaben */
}

/* Container für das Bild */
#container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

#image {
    width: 100%;
    max-width: 100%;
    height: auto;
    touch-action: none;
    transform-origin: center center;
    transition: transform 0.1s ease-out;
}

/* Buttons fixieren */
.controls {
    position: fixed;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    box-sizing: border-box;
    z-index: 9999;
}

.controls img {
    width: 60px;
    cursor: pointer;
    user-select: none;
}
</style>
</head>
<body>

<div id="container">
    <img id="image" src="01.jpg">
</div>

<div class="controls">
    <img src="Button_L.png" id="prevBtn">
    <img src="Button_R.png" id="nextBtn">
</div>

<script>
// Bilddaten
const images = ["01.jpg","02.jpg","03.jpg","04.jpg"];
let current = 0;

const img = document.getElementById('image');
const container = document.getElementById('container');

// Navigation
document.getElementById('prevBtn').onclick = () => {
    current = (current - 1 + images.length) % images.length;
    resetZoom();
    img.src = images[current];
};
document.getElementById('nextBtn').onclick = () => {
    current = (current + 1) % images.length;
    resetZoom();
    img.src = images[current];
};

// Zoom & Drag Variablen
let scale = 1;
let lastScale = 1;
let startDistance = 0;
let startX = 0, startY = 0;
let offsetX = 0, offsetY = 0;
let lastX = 0, lastY = 0;

// Touch Events
container.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        startDistance = getDistance(e.touches[0], e.touches[1]);
        lastScale = scale;
    } else if (e.touches.length === 1) {
        startX = e.touches[0].clientX - offsetX;
        startY = e.touches[0].clientY - offsetY;
    }
});

container.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
        const newDistance = getDistance(e.touches[0], e.touches[1]);
        scale = Math.max(1, Math.min(5, lastScale * newDistance / startDistance));
        applyTransform();
    } else if (e.touches.length === 1) {
        offsetX = e.touches[0].clientX - startX;
        offsetY = e.touches[0].clientY - startY;
        applyTransform();
    }
});

container.addEventListener('touchend', e => {
    if (scale < 1) {
        resetZoom();
    }
});

function getDistance(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

function applyTransform() {
    const rect = img.getBoundingClientRect();
    // Bild nicht aus Container verschieben
    const maxX = Math.max(0, (scale - 1) * rect.width / 2);
    const maxY = Math.max(0, (scale - 1) * rect.height / 2);
    let x = Math.min(maxX, Math.max(-maxX, offsetX));
    let y = Math.min(maxY, Math.max(-maxY, offsetY));
    img.style.transform = `scale(${scale}) translate(${x/scale}px, ${y/scale}px)`;
}

function resetZoom() {
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    img.style.transform = `scale(1) translate(0,0)`;
}
</script>

</body>
</html>
